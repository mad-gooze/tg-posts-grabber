# Sources for tg-grabber. type: rss | html | telegram | linkedin | slack | discord | hn | bluesky
#   html:     a blog index URL with no native feed; posts are scraped and dated via
#             trafilatura (see grabber/fetchers/html.py). Optional post_pattern (regex
#             matched against a link's URL path) selects posts when they don't sit one
#             segment below the blog path; post_exclude drops false positives.
#   telegram: public channel username (scraped via t.me/s/<name>)
#   linkedin: a seed Pulse article URL by an author to follow; their recent articles are
#             re-derived from that page each run (no auth). See docs/sources-setup.md.
#   slack:    "<workspace-slug>/<channel-id>"; needs a user token (see docs/sources-setup.md)
#   discord:  "<guild-id>/<channel-id>";       needs a user token (see docs/sources-setup.md)
#   hn:       Hacker News search query (Algolia)
#   bluesky:  a handle (author feed); public API, no auth. (Reddit stays on rss — its JSON API blocks bots.)
# Disable a source with enabled: false instead of deleting it.
# proxy: true fetches a source through SOCKS5_PROXY from .env (for sources blocked on the
# local network); without the flag a failed direct fetch is retried via the proxy anyway.

